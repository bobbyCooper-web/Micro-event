<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Ambeer Events • Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    .hub { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; align-items: start; }
    .card { background: #0f1a33; padding: 14px; border-radius: 12px; border: 1px solid rgba(255, 209, 102, 0.25); }
    .muted { opacity: .75; }
    .hero { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255, 209, 102, 0.25); }
    .hero img { width: 100%; height: 420px; object-fit: cover; display:block; opacity: 0; transition: opacity .35s ease; }
    .hero img.loaded { opacity: 1; }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(11,19,32,.78), rgba(11,19,32,.10));
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 16px;
    }
    .overlay h2 { margin: 0 0 6px; color: #ffd166; }
    .overlay p { margin: 0; max-width: 48ch; }
    .dots { display:flex; gap: 6px; margin-top: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 999px; border: 1px solid rgba(255,209,102,.7); opacity: .55; cursor:pointer; }
    .dot.active { opacity: 1; background: #ffd166; }

    .access-row { display:flex; gap: 8px; margin-top: 10px; }
    .access-row input {
      flex: 1; padding: 10px; border-radius: 8px;
      border: 1px solid #ffd166; background: #0f1724; color: #ffd166; outline: none;
    }
    .access-row button {
      padding: 10px 14px; border-radius: 8px; border: none; cursor:pointer;
      background: linear-gradient(135deg, #ffb347, #ffd166); color: #0b1320; font-weight: 700;
    }
    .msg { margin-top: 10px; font-weight: 700; }
    .msg.ok { color: #34d399; }
    .msg.err { color: #f87171; }

    @media (max-width: 900px) {
      .hub { grid-template-columns: 1fr; }
      .hero img { height: 320px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Ambeer Events</h1>
      <div class="muted">Hub • Choisissez votre expérience</div>
    </header>

    <main class="hub">
      <!-- CAROUSEL -->
      <section class="hero">
        <img id="slideImg" alt="Présentation jeu" loading="lazy" />
        <div class="overlay">
          <h2 id="slideTitle">Chargement…</h2>
          <p id="slideText" class="muted"></p>
          <div class="dots" id="dots"></div>
        </div>
      </section>

      <!-- ACCÈS PAR CODE -->
      <aside class="card">
        <h2 style="margin-top:0;color:#ffd166;">Accès par code</h2>
        <p class="muted" style="margin-top:6px;">
          Entrez le code fourni après paiement pour accéder au jeu correspondant.
        </p>

        <div class="access-row">
          <input id="accessCode" type="text" placeholder="Ex: RALLY10" autocomplete="off" />
          <button id="goBtn" type="button">Accéder</button>
        </div>

        <div id="msg" class="msg muted"></div>

        <hr style="border:0;border-top:1px solid rgba(255,209,102,.18); margin:14px 0;">

        <div class="muted">
          <strong style="color:#ffd166;">Astuce</strong> : vous pouvez intégrer ici vos offres (packs) et tarifs RP.
        </div>
      </aside>
    </main>
  </div>

  <script>
    const slides = [
      {
        title: "Rally Photo",
        text: "Course d’orientation + indices + validation par code. Idéal team-building rapide.",
        img: "/hub/rally.jpg"
      },
      {
        title: "Quiz Team (bientôt)",
        text: "Questions, défis, manches chronométrées. Parfait pour des équipes mixtes.",
        img: "/hub/quiz.jpg"
      },
      {
        title: "Escape Game (bientôt)",
        text: "Énigmes, narration, progression par paliers. Format immersion.",
        img: "/hub/escape.jpg"
      }
    ];

    let idx = 0;
    let timer = null;

    const elImg = document.getElementById("slideImg");
    const elTitle = document.getElementById("slideTitle");
    const elText = document.getElementById("slideText");
    const elDots = document.getElementById("dots");
    const elCode = document.getElementById("accessCode");
    const elMsg = document.getElementById("msg");

    function setMsg(text, type) {
      elMsg.textContent = text || "";
      elMsg.className = "msg " + (type || "muted");
    }

    function renderDots() {
      elDots.innerHTML = slides.map((_, i) =>
        `<div class="dot ${i===idx?'active':''}" data-i="${i}"></div>`
      ).join("");
    }

    function showSlide(i) {
      idx = (i + slides.length) % slides.length;
      const s = slides[idx];
      elTitle.textContent = s.title;
      elText.textContent = s.text;

      elImg.classList.remove("loaded");
      elImg.onload = () => elImg.classList.add("loaded");
      elImg.onerror = () => elImg.classList.remove("loaded");
      elImg.src = s.img;

      renderDots();
    }

    function startAuto() {
      if (timer) clearInterval(timer);
      timer = setInterval(() => showSlide(idx + 1), 4500);
    }

    elDots.addEventListener("click", (e) => {
      const t = e.target;
      if (!t || !t.dataset || t.dataset.i == null) return;
      showSlide(Number(t.dataset.i));
      startAuto();
    });

    async function access() {
  if (isAccessing) return;
  isAccessing = true;

  const code = (elCode.value || "").trim().replace(/\s+/g, "").toUpperCase();
  if (!code) { setMsg("Entrez un code.", "err"); elCode.focus(); isAccessing=false; return; }

  setMsg("Vérification…", "muted");
  try {
    const res = await fetch("/api/access", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });

    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) {
      setMsg(data.error || "Code invalide.", "err");
      isAccessing = false;
      return;
    }

    setMsg(`Accès OK : ${data.label || "jeu"}… redirection`, "ok");
    window.location.href = data.path;
  } catch {
    setMsg("Erreur réseau. Réessayez.", "err");
    isAccessing = false;
  }
}

    document.getElementById("goBtn").addEventListener("click", access);
    elCode.addEventListener("keydown", (e) => { if (e.key === "Enter") access(); });

    // Boot
    showSlide(0);
    startAuto();
    setMsg("", "muted");
  </script>
</body>
</html>
