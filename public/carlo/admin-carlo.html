<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • Don Carlo</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
    h1 { margin: 0 0 6px; }
    .admin-bar { display:flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 10px 0 14px; }
    .admin-bar input[type="password"] { min-width: 240px; }
    .muted { opacity: .8; }
    .error { color: var(--err); font-weight: 800; }
    .success { color: var(--ok); font-weight: 800; }

    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }
    th, td { padding: 10px 10px; border-bottom: 1px solid rgba(148,163,184,.14); vertical-align: middle; }
    th { text-align: left; background: rgba(255,255,255,.03); color: rgba(229,231,235,.92); font-weight: 900; }
    td.num { text-align: right; white-space: nowrap; }

    .tag { display:inline-block; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(148,163,184,.25); background: rgba(2,6,23,.35); font-size: 12px; }
    .tag.ok { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.12); }
    .tag.warn { border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.12); }

    .row-actions { display:flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .row-actions button { padding: 8px 10px; }
    .mini { font-size: 12px; }

    .gridFlags { display:flex; gap: 6px; flex-wrap: wrap; }
    .gridFlags .tag { cursor: default; }

    .top-actions { display:flex; gap: 8px; align-items: center; }
    .spacer { flex: 1; }
  </style>
</head>
<body>
  <header>
    <h1>Admin • Don Carlo</h1>
    <div class="muted">Validation par flags • Vue progression (sans réponses)</div>

    <div class="admin-bar">
      <label for="adminkey"><strong>Clé admin</strong></label>
      <input id="adminkey" type="password" placeholder="ADMIN_KEY" autocomplete="off" />
      <button id="saveKey">Enregistrer</button>
      <span id="keyStatus" class="muted"></span>
      <span class="spacer"></span>
      <div class="top-actions">
        <button id="refreshNow">Rafraîchir</button>
        <label class="muted">
          Auto-refresh:
          <select id="autoint">
            <option value="0">Off</option>
            <option value="1000">1s</option>
            <option value="2000" selected>2s</option>
            <option value="5000">5s</option>
          </select>
        </label>
      </div>
    </div>
  </header>

  <section id="status" class="muted"></section>

  <section>
    <table>
      <thead>
        <tr>
          <th>Équipe</th>
          <th>Statut</th>
          <th>Étape en cours</th>
          <th class="num">Progression</th>
          <th>Flags</th>
          <th class="num">Erreurs</th>
          <th class="num">Début</th>
          <th class="num">Fin</th>
          <th class="num">Temps</th>
          <th class="num">Actions rapides</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="10" class="muted">Chargement…</td></tr>
      </tbody>
    </table>
  </section>

  <script>
    const elKey = document.getElementById('adminkey');
    const elSaveKey = document.getElementById('saveKey');
    const elKeyStatus = document.getElementById('keyStatus');
    const elStatus = document.getElementById('status');
    const elTbody = document.getElementById('tbody');
    const elRefreshNow = document.getElementById('refreshNow');
    const elAutoInt = document.getElementById('autoint');

    function getKey() { return localStorage.getItem('AMBEER_ADMIN_KEY') || ''; }
    function setKey(k) {
      localStorage.setItem('AMBEER_ADMIN_KEY', k || '');
      elKeyStatus.textContent = k ? 'Clé enregistrée' : 'Aucune clé';
      elKeyStatus.className = k ? 'success' : 'muted';
    }
    function authHeaders() {
      const key = getKey();
      return key ? { 'x-admin-key': key } : {};
    }

    function setStatus(msg, isError=false) {
      elStatus.textContent = msg || '';
      elStatus.className = isError ? 'error' : 'muted';
    }

    function msToClock(ms) {
      if (ms == null) return '—';
      const s = Math.max(0, Math.floor(ms / 1000));
      const hh = Math.floor(s / 3600).toString().padStart(2,'0');
      const mm = Math.floor((s % 3600) / 60).toString().padStart(2,'0');
      const ss = (s % 60).toString().padStart(2,'0');
      return `${hh}:${mm}:${ss}`;
    }

    function fmtTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }

    function tag(label, cls='') {
      return `<span class="tag ${cls}">${label}</span>`;
    }

    function flagsCell(flags={}) {
      const entries = Object.entries(flags || {});
      if (!entries.length) return `<span class="muted mini">—</span>`;
      const wanted = ['caravan_arrived','caravan_exterior_ok','final_gate_opened','game_completed'];
      const ordered = wanted
        .map(k => [k, flags?.[k]])
        .filter(([k,v]) => v !== undefined)
        .concat(entries.filter(([k]) => !wanted.includes(k)));

      return `
        <div class="gridFlags">
          ${ordered.map(([k,v]) => tag(`${k}:${String(v)}`, v === true ? 'ok' : '')) .join('')}
        </div>
      `;
    }

    function statusTag(t) {
      if (t.status === 'finished') return tag('FINI', 'ok');
      if (t.status === 'running') return tag('EN COURS', 'warn');
      return tag('NON DÉMARRÉ');
    }

    function row(t) {
      const idx = Number(t.routeIndex) || 0;
      const total = Number(t.routeTotal) || 0;
      const step = t.stepTitle ? `${t.stepTitle}` : (t.stepId || '—');
      const started = t.timing?.startAt;
      const finished = t.timing?.finishAt;
      const durationMs = t.timing?.durationMs;

      const quick = `
        
        <div class="row-actions">
          <button data-action="setflag-advance" data-flag="caravan_arrived" data-val="true" data-team="${t.teamId}">Arrivée ✅</button>
          <button data-action="setflag-advance" data-flag="caravan_exterior_ok" data-val="true" data-team="${t.teamId}">Ext ✅</button>
          <button data-action="setflag-advance" data-flag="final_gate_opened" data-val="true" data-team="${t.teamId}">Phare ✅</button>
          <button data-action="advance" data-team="${t.teamId}" class="btn-ghost">Passer étape ▶</button>
          <button data-action="setflag" data-flag="caravan_arrived" data-val="false" data-team="${t.teamId}" class="btn-ghost">Arrivée ✕</button>
        </div>
      `;

      return `
        <tr>
          <td><strong>${t.label || t.teamId}</strong><div class="muted mini">${t.teamId}</div></td>
          <td>${statusTag(t)}</td>
          <td>${step}</td>
          <td class="num"><strong>${Math.min(idx+1, total)} / ${total || '—'}</strong></td>
          <td>${flagsCell(t.flags)}</td>
          <td class="num">${Number(t.wrongAttempts || 0)}</td>
          <td class="num">${fmtTime(started)}</td>
          <td class="num">${fmtTime(finished)}</td>
          <td class="num"><strong>${msToClock(durationMs)}</strong></td>
          <td class="num">${quick}</td>
        </tr>
      `;
    }

    async function fetchOverview() {
      try {
        const res = await fetch('/api/admin/carlo/overview', { headers: { ...authHeaders() }, cache: 'no-store' });
        const data = await res.json().catch(()=>({}));
        if (!res.ok || !data?.ok) throw new Error(data?.error || `HTTP ${res.status}`);

        const teams = data.teams || [];
        if (!teams.length) {
          elTbody.innerHTML = `<tr><td colspan="10" class="muted">Aucune équipe configurée.</td></tr>`;
          return;
        }
        elTbody.innerHTML = teams.map(row).join('');
        setStatus('');
      } catch (e) {
        setStatus(`Erreur: ${e.message}`, true);
      }
    }

    async function setFlag(teamId, flag, value) {

      const res = await fetch('/api/admin/carlo/flag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ teamId, flag, value })
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok || !data?.ok) throw new Error(data?.error || `HTTP ${res.status}`);
    }


    async function advanceStep(teamId) {
      const res = await fetch('/api/admin/carlo/advance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ teamId })
      });
      const data = await res.json().catch(()=>({}));
      if (!res.ok || !data?.ok) throw new Error(data?.error || `HTTP ${res.status}`);
      return data;
    }


        elSaveKey.addEventListener('click', () => { setKey(elKey.value.trim()); fetchOverview(); });
    elRefreshNow.addEventListener('click', () => fetchOverview());

    elTbody.addEventListener('click', async (e) => {
      const t = e.target;
      if (!(t instanceof HTMLElement)) return;
      const teamId = t.getAttribute('data-team');
      const action = t.getAttribute('data-action') || 'setflag';
      const flag = t.getAttribute('data-flag');
      const valRaw = t.getAttribute('data-val');
      if (!teamId) return;
      if (action !== 'advance' && !flag) return;
      const value = (valRaw === 'true') ? true : (valRaw === 'false' ? false : valRaw);
      try {
        if (action === 'advance') {
          await advanceStep(teamId);
        } else if (action === 'setflag-advance') {
          await setFlag(teamId, flag, value);
          await advanceStep(teamId);
        } else {
          await setFlag(teamId, flag, value);
        }
        await fetchOverview();
        setStatus('OK');
      } catch (err) {
        setStatus(err.message || 'Erreur action', true);
      }
    });

    let refreshHandle = null;
    function setupInterval(ms) {
      if (refreshHandle) clearInterval(refreshHandle);
      if (ms && ms > 0) refreshHandle = setInterval(fetchOverview, ms);
    }
    elAutoInt.addEventListener('change', () => setupInterval(Number(elAutoInt.value)));

    (function init(){
      const saved = getKey();
      if (saved) { elKey.value = saved; elKeyStatus.textContent = 'Clé enregistrée'; elKeyStatus.className = 'success'; }
      else { elKeyStatus.textContent = 'Aucune clé'; elKeyStatus.className = 'muted'; }
      fetchOverview();
      setupInterval(Number(elAutoInt.value));
    })();
  </script>
</body>
</html>
