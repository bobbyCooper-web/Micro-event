<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agent Fédéral • Don Carlo</title>
  <style>
    :root {
      --bg:    #07090f;
      --bg1:   #0d1220;
      --bg2:   #121c32;
      --bg3:   #182340;
      --gold:  #c9a84c;
      --gold2: #e8ca7a;
      --glow:  rgba(201,168,76,.15);
      --red:   #e05a5a;
      --green: #4caf7d;
      --blue:  #5a9ae0;
      --text:  #e8dfc8;
      --muted: rgba(232,223,200,.5);
      --bdr:   rgba(201,168,76,.2);
      --bdr2:  rgba(201,168,76,.38);
      --sh:    0 12px 40px rgba(0,0,0,.65);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Georgia',serif;min-height:100vh;
      background-image:
        radial-gradient(ellipse 900px 400px at 15% 0%,rgba(201,168,76,.07),transparent),
        radial-gradient(ellipse 700px 500px at 85% 90%,rgba(90,154,224,.05),transparent);
    }

    /* ===== LAYOUT ===== */
    .app{ max-width:1160px;margin:0 auto;padding:20px 14px 60px; }

    /* ===== HEADER ===== */
    .topbar{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;flex-wrap:wrap;
      padding:16px 20px;margin-bottom:18px;
      background:linear-gradient(135deg,var(--bg2),var(--bg1));
      border:1px solid var(--bdr2);border-radius:14px;box-shadow:var(--sh);
    }
    .topbar h1{font-size:1.2rem;font-weight:700;color:var(--gold);letter-spacing:.4px;}
    .topbar .sub{font-size:.9rem;color:var(--muted);font-style:italic;margin-top:2px;}

    /* ===== LOGIN ===== */
    #loginBox{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    }
    #loginBox input{
      padding:8px 12px;border-radius:9px;border:1px solid var(--bdr2);
      background:var(--bg);color:var(--text);font:1rem Georgia,serif;
      width:160px;outline:none;
    }
    #loginBox input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--glow);}

    /* ===== TABS ===== */
    #tabsBar{
      display:none;gap:6px;margin-bottom:18px;
      background:var(--bg1);border:1px solid var(--bdr);border-radius:12px;
      padding:6px;flex-wrap:wrap;
    }
    .tab{
      padding:8px 16px;border-radius:9px;border:1px solid transparent;
      background:transparent;color:var(--muted);
      font:600 .88rem Georgia,serif;cursor:pointer;letter-spacing:.3px;
      transition:all .15s;
    }
    .tab:hover{color:var(--text);background:rgba(255,255,255,.04);}
    .tab.active{
      background:linear-gradient(135deg,var(--bg3),var(--bg2));
      border-color:var(--bdr2);color:var(--gold);
      box-shadow:0 4px 12px rgba(0,0,0,.4);
    }

    /* ===== STATUS ===== */
    #statusBar{
      display:none;padding:10px 16px;border-radius:9px;
      font-size:.93rem;margin-bottom:16px;border:1px solid transparent;
    }
    #statusBar.ok {display:block;background:rgba(76,175,125,.1);border-color:rgba(76,175,125,.3);color:var(--green);}
    #statusBar.err{display:block;background:rgba(224,90,90,.1);border-color:rgba(224,90,90,.3);color:var(--red);}
    #statusBar.info{display:block;background:rgba(201,168,76,.06);border-color:var(--bdr);color:var(--muted);}

    /* ===== PANELS ===== */
    .panel-view{display:none;}
    .panel-view.active{display:block;}

    /* ===== CARDS ÉQUIPES ===== */
    .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}

    .tc{
      position:relative;overflow:hidden;
      background:linear-gradient(160deg,var(--bg2),var(--bg1));
      border:1px solid var(--bdr);border-radius:14px;padding:16px;
      box-shadow:0 8px 28px rgba(0,0,0,.4);
      transition:border-color .2s;
    }
    .tc::before{
      content:"";position:absolute;inset:0 0 auto;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35;
    }
    .tc:hover{border-color:var(--bdr2);}

    .tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:12px;}
    .tc-name{font-size:1.05rem;font-weight:700;color:var(--gold);}

    .badge{
      font-size:.72rem;padding:3px 9px;border-radius:999px;
      font-weight:700;white-space:nowrap;
    }
    .badge-green{background:rgba(76,175,125,.12);border:1px solid rgba(76,175,125,.4);color:var(--green);}
    .badge-gold {background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.35);color:var(--gold);}
    .badge-muted{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--muted);}

    /* Progress */
    .prog-row{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:5px;}
    .prog-bar{height:5px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;margin-bottom:12px;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:999px;transition:width .4s;}

    /* Step info */
    .step-box{
      background:rgba(0,0,0,.25);border:1px solid var(--bdr);border-radius:10px;
      padding:10px 12px;margin-bottom:12px;font-size:.88rem;
    }
    .step-box .sl{font-weight:700;color:var(--text);margin-bottom:2px;}
    .step-box .ss{color:var(--muted);font-size:.82rem;font-style:italic;}

    .timing{font-size:.82rem;color:var(--muted);font-style:italic;margin-bottom:10px;}
    .timing span{color:var(--gold2);font-weight:700;}

    /* Gates */
    .gates-title,.flags-title{
      font-size:.78rem;color:var(--muted);text-transform:uppercase;
      letter-spacing:.5px;margin-bottom:8px;font-weight:700;
    }
    .gate-row{
      display:flex;justify-content:space-between;align-items:center;gap:8px;
      padding:9px 11px;border-radius:9px;margin-bottom:6px;
      background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.25);
      transition:border-color .2s;
    }
    .gate-row.done{background:rgba(76,175,125,.06);border-color:rgba(76,175,125,.3);}
    .gate-lbl{font-size:.9rem;font-weight:600;color:var(--text);}
    .gate-sub{font-size:.8rem;color:var(--muted);font-style:italic;margin-top:1px;}

    /* Fragments */
    .frags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .frag{
      padding:3px 9px;border-radius:999px;font-size:.78rem;
      background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold2);
    }

    /* Wrong attempts */
    .wrong{font-size:.8rem;color:var(--muted);font-style:italic;margin-top:6px;}

    /* ===== BUTTONS ===== */
    button{
      font:700 .83rem Georgia,serif;padding:8px 14px;
      border-radius:9px;border:1px solid var(--bdr2);cursor:pointer;
      transition:all .15s;letter-spacing:.3px;
    }
    button:active{transform:scale(.97);}
    .btn-gold{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#0d1220;border-color:var(--gold2);
    }
    .btn-gold:hover{filter:brightness(1.07);box-shadow:0 6px 16px rgba(201,168,76,.3);}
    .btn-ghost{background:transparent;color:var(--gold);}
    .btn-ghost:hover{background:var(--glow);}
    .btn-green{
      background:linear-gradient(135deg,#2d6b4a,#3d8a60);
      color:#cefce4;border-color:rgba(76,175,125,.5);
    }
    .btn-green:hover{filter:brightness(1.1);box-shadow:0 6px 14px rgba(76,175,125,.22);}
    .btn-sm{padding:5px 10px;font-size:.75rem;}
    button:disabled{opacity:.4;cursor:not-allowed;filter:none!important;box-shadow:none!important;}

    /* ===== LEADERBOARD ===== */
    .lb-table{width:100%;border-collapse:collapse;}
    .lb-table th{
      text-align:left;padding:10px 14px;font-size:.8rem;
      color:var(--muted);text-transform:uppercase;letter-spacing:.4px;
      border-bottom:1px solid var(--bdr);
    }
    .lb-table td{padding:11px 14px;border-bottom:1px solid rgba(201,168,76,.08);font-size:.93rem;}
    .lb-table tr:hover td{background:rgba(255,255,255,.02);}
    .lb-table .rank{font-size:1rem;font-weight:700;color:var(--gold);}
    .lb-table .fin{color:var(--green);font-weight:700;}
    .lb-table .run{color:var(--blue);}

    /* ===== ROUTE DETAIL ===== */
    .route-list{margin-top:10px;}
    .route-item{
      display:flex;align-items:center;gap:10px;
      padding:8px 12px;border-radius:8px;margin-bottom:4px;
      border:1px solid transparent;font-size:.88rem;
    }
    .route-item.done{background:rgba(76,175,125,.06);border-color:rgba(76,175,125,.2);}
    .route-item.current{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.3);}
    .route-item.todo{background:rgba(0,0,0,.15);border-color:rgba(255,255,255,.05);color:var(--muted);}
    .ri-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
    .done .ri-num{background:rgba(76,175,125,.2);color:var(--green);}
    .current .ri-num{background:rgba(201,168,76,.2);color:var(--gold);}
    .todo .ri-num{background:rgba(255,255,255,.06);color:var(--muted);}

    /* ===== FLAG CUSTOM MODAL ===== */
    .modal{
      position:fixed;inset:0;background:rgba(0,0,0,.75);
      display:flex;align-items:center;justify-content:center;
      padding:16px;z-index:9999;backdrop-filter:blur(3px);
    }
    .modal.hidden{display:none!important;}
    .modal-box{
      background:linear-gradient(160deg,var(--bg3),var(--bg2));
      border:1px solid var(--bdr2);border-radius:14px;padding:20px;
      width:min(420px,100%);box-shadow:0 20px 60px rgba(0,0,0,.7);
    }
    .modal-box h3{font-size:1rem;color:var(--gold);margin-bottom:14px;}
    .mf{margin-bottom:12px;}
    .mf label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:5px;font-style:italic;}
    .mf input{
      width:100%;padding:9px 12px;border-radius:9px;
      border:1px solid var(--bdr2);background:var(--bg);
      color:var(--text);font:1rem Georgia,serif;outline:none;
    }
    .mf input:focus{border-color:var(--gold);}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}

    .empty{text-align:center;padding:50px 20px;color:var(--muted);font-style:italic;grid-column:1/-1;}
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="topbar">
    <div>
      <h1>🗂 Don Carlo — Agent Fédéral</h1>
      <div class="sub">Tableau de bord opérationnel • Accès restreint</div>
    </div>
    <div id="loginBox">
      <input id="adminKeyInput" type="password" placeholder="Clé admin…" />
      <button class="btn-gold" id="connectBtn">Connexion</button>
    </div>
  </div>

  <!-- STATUS -->
  <div id="statusBar"></div>

  <!-- TABS -->
  <div id="tabsBar">
    <button class="tab active" data-tab="teams">🧑‍🤝‍🧑 Équipes</button>
    <button class="tab" data-tab="leaderboard">🏆 Classement</button>
    <button class="tab" data-tab="route">🗺 Routes</button>
    <div style="flex:1"></div>
    <button class="btn-ghost" id="refreshBtn" style="font-size:.8rem">⟳ Actualiser</button>
    <button class="btn-ghost" id="customFlagBtn" style="font-size:.8rem">＋ Flag custom</button>
  </div>

  <!-- PANEL : ÉQUIPES -->
  <div id="view-teams" class="panel-view active">
    <div class="teams-grid" id="teamsGrid">
      <div class="empty">Connectez-vous pour accéder au tableau de bord.</div>
    </div>
  </div>

  <!-- PANEL : LEADERBOARD -->
  <div id="view-leaderboard" class="panel-view">
    <div style="background:linear-gradient(160deg,var(--bg2),var(--bg1));border:1px solid var(--bdr);border-radius:14px;padding:16px;box-shadow:var(--sh);">
      <table class="lb-table" id="lbTable">
        <thead>
          <tr>
            <th>#</th><th>Équipe</th><th>Progression</th><th>Statut</th><th>Temps</th><th>Erreurs</th>
          </tr>
        </thead>
        <tbody id="lbBody">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px;font-style:italic;">Chargement…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- PANEL : ROUTES -->
  <div id="view-route" class="panel-view">
    <div id="routeGrid" class="teams-grid"></div>
  </div>

</div>

<!-- MODAL FLAG CUSTOM -->
<div id="customFlagModal" class="modal hidden">
  <div class="modal-box">
    <h3>Poser un flag manuellement</h3>
    <div class="mf"><label>Équipe (teamId)</label><input id="mTeamId" type="text" placeholder="carlo-richesse" /></div>
    <div class="mf"><label>Clé du flag</label><input id="mFlagKey" type="text" placeholder="caravan_arrived" /></div>
    <div class="mf"><label>Valeur</label><input id="mFlagVal" type="text" value="true" /></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="mCancelBtn">Annuler</button>
      <button class="btn-gold" id="mConfirmBtn">Confirmer</button>
    </div>
  </div>
</div>

<script>
(function(){

  // =====================
  // CONFIG GATES MANUELS
  // =====================
  const MANUAL_FLAGS = {
    caravan_arrived:     { label:"Caravane repérée",   desc:"L'équipe est sur place" },
    caravan_exterior_ok: { label:"Extérieur validé",   desc:"Détail extérieur confirmé" },
    final_gate_opened:   { label:"Accès phare ouvert", desc:"Clé remise par le MJ" },
  };

  // =====================
  // STATE
  // =====================
  let adminKey  = "";
  let polling   = null;
  let teamsData = [];
  let currentTab = "teams";

  // =====================
  // DOM
  // =====================
  const statusBar   = document.getElementById("statusBar");
  const tabsBar     = document.getElementById("tabsBar");
  const connectBtn  = document.getElementById("connectBtn");
  const adminKeyIn  = document.getElementById("adminKeyInput");
  const refreshBtn  = document.getElementById("refreshBtn");
  const customFlagBtn = document.getElementById("customFlagBtn");
  const teamsGrid   = document.getElementById("teamsGrid");
  const lbBody      = document.getElementById("lbBody");
  const routeGrid   = document.getElementById("routeGrid");
  const modal       = document.getElementById("customFlagModal");
  const mTeamId     = document.getElementById("mTeamId");
  const mFlagKey    = document.getElementById("mFlagKey");
  const mFlagVal    = document.getElementById("mFlagVal");
  const mCancelBtn  = document.getElementById("mCancelBtn");
  const mConfirmBtn = document.getElementById("mConfirmBtn");

  function setStatus(msg, type="info"){
    statusBar.textContent = msg;
    statusBar.className   = type;
  }
  function clearStatus(){ statusBar.className = ""; }

  // =====================
  // TABS
  // =====================
  document.querySelectorAll(".tab[data-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      currentTab = btn.dataset.tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".panel-view").forEach(p => p.classList.remove("active"));
      document.getElementById("view-"+currentTab)?.classList.add("active");
      renderCurrentTab();
    });
  });

  function renderCurrentTab(){
    if (currentTab === "teams")       renderTeams();
    else if (currentTab === "leaderboard") renderLeaderboard();
    else if (currentTab === "route")  renderRoutes();
  }

  // =====================
  // API
  // =====================
  async function apiFetch(url, opts={}){
    const res = await fetch(url, {
      ...opts,
      headers:{ "Content-Type":"application/json", "x-admin-key":adminKey, ...(opts.headers||{}) }
    });
    const data = await res.json().catch(()=>({}));
    return { ok:res.ok, status:res.status, data };
  }

  async function loadOverview(){
    const { ok, data, status } = await apiFetch("/api/admin/carlo/overview");
    if(!ok){
      if(status===401){ setStatus("Clé admin invalide.", "err"); stopPolling(); }
      else setStatus(data?.error||"Erreur serveur.", "err");
      return false;
    }
    teamsData = data.teams || [];
    renderCurrentTab();
    clearStatus();
    return true;
  }

  async function setFlag(teamId, flagKey, flagValue){
    const { ok, data } = await apiFetch("/api/admin/carlo/flag", {
      method:"POST",
      body:JSON.stringify({ teamId, flag:flagKey, value:flagValue })
    });
    if(!ok){ setStatus(data?.error||"Erreur flag.", "err"); return false; }
    return true;
  }

  // =====================
  // RENDER ÉQUIPES
  // =====================
  function renderTeams(){
    if(!teamsData.length){
      teamsGrid.innerHTML = `<div class="empty">Aucune équipe connectée.</div>`;
      return;
    }
    teamsGrid.innerHTML = teamsData.map(t => teamCard(t)).join("");

    teamsGrid.querySelectorAll("[data-flag-set]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const tid = btn.dataset.teamId;
        const key = btn.dataset.flagKey;
        const val = btn.dataset.flagVal === "true";
        btn.disabled = true;
        const ok = await setFlag(tid, key, val);
        if(ok){ setStatus(`✅ "${key}" validé pour ${tid}`, "ok"); await loadOverview(); }
        btn.disabled = false;
      });
    });
  }

  function teamCard(t){
    const pct    = t.routeTotal > 0 ? Math.round(t.routeIndex / t.routeTotal * 100) : 0;
    const flags  = t.flags     || {};
    const frags  = t.fragments || {};

    // Badge
    const badge = t.status === "finished"
      ? `<span class="badge badge-green">✓ Terminé</span>`
      : t.status === "running"
        ? `<span class="badge badge-gold">▶ En cours</span>`
        : `<span class="badge badge-muted">— Attente</span>`;

    // Timing
    let timingHtml = "";
    if(t.timing?.finished){
      timingHtml = `<div class="timing">Durée : <span>${fmtDuration(t.timing.durationMs)}</span></div>`;
    } else if(t.timing?.started){
      timingHtml = `<div class="timing">En jeu depuis : <span>${elapsed(t.timing.startAt)}</span></div>`;
    }

    // Étape
    const stepHtml = t.stepTitle
      ? `<div class="step-box"><div class="sl">${esc(t.stepTitle)}</div><div class="ss">${esc(t.stepId||"")} • étape ${t.routeIndex+1}/${t.routeTotal}</div></div>`
      : "";

    // Gates manuelles
    const gatesHtml = Object.entries(MANUAL_FLAGS).map(([key, meta]) => {
      const done = flags[key] === true;
      return `<div class="gate-row ${done?"done":""}">
        <div><div class="gate-lbl">${esc(meta.label)}</div><div class="gate-sub">${esc(meta.desc)}</div></div>
        ${done
          ? `<span class="badge badge-green">✓ OK</span>`
          : `<button class="btn-green btn-sm" data-flag-set="1"
               data-team-id="${esc(t.teamId)}" data-flag-key="${esc(key)}" data-flag-val="true">Valider</button>`
        }
      </div>`;
    }).join("");

    // Fragments
    const fragsHtml = Object.entries(frags).length
      ? `<div class="frags">${Object.entries(frags).map(([ch,v])=>`<span class="frag">${esc(ch)} : ${v}</span>`).join("")}</div>`
      : "";

    return `<div class="tc">
      <div class="tc-head"><div class="tc-name">${esc(t.label||t.teamId)}</div>${badge}</div>
      ${timingHtml}
      <div class="prog-row"><span>Progression</span><span>${t.routeIndex} / ${t.routeTotal}</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${stepHtml}
      <div class="gates-title">Portes manuelles</div>
      ${gatesHtml}
      ${fragsHtml}
      ${t.wrongAttempts ? `<div class="wrong">${t.wrongAttempts} tentative(s) incorrecte(s)</div>` : ""}
    </div>`;
  }

  // =====================
  // RENDER LEADERBOARD
  // =====================
  function renderLeaderboard(){
    const sorted = [...teamsData].sort((a,b) => {
      if(a.status==="finished" && b.status!=="finished") return -1;
      if(b.status==="finished" && a.status!=="finished") return  1;
      if(a.timing?.durationMs && b.timing?.durationMs) return a.timing.durationMs - b.timing.durationMs;
      return b.routeIndex - a.routeIndex;
    });

    lbBody.innerHTML = sorted.map((t,i) => {
      const prog = `${t.routeIndex} / ${t.routeTotal}`;
      const statut = t.status==="finished"
        ? `<span class="fin">✓ Terminé</span>`
        : t.status==="running"
          ? `<span class="run">▶ En cours</span>`
          : `<span style="color:var(--muted)">—</span>`;
      const temps = t.timing?.finished
        ? fmtDuration(t.timing.durationMs)
        : t.timing?.started ? `${elapsed(t.timing.startAt)} ⏱` : "—";
      return `<tr>
        <td><span class="rank">${i+1}</span></td>
        <td>${esc(t.label||t.teamId)}</td>
        <td>${prog}</td>
        <td>${statut}</td>
        <td>${esc(temps)}</td>
        <td>${t.wrongAttempts||0}</td>
      </tr>`;
    }).join("") || `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px;font-style:italic;">Aucune donnée.</td></tr>`;
  }

  // =====================
  // RENDER ROUTES
  // =====================
  function renderRoutes(){
    routeGrid.innerHTML = teamsData.map(t => {
      // On n'a pas la route complète dans l'overview, on affiche ce qu'on sait
      return `<div class="tc">
        <div class="tc-head">
          <div class="tc-name">${esc(t.label||t.teamId)}</div>
          <span class="badge ${t.status==="finished"?"badge-green":t.status==="running"?"badge-gold":"badge-muted"}">
            ${t.status==="finished"?"✓":t.status==="running"?"▶":"—"}
          </span>
        </div>
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:10px;">
          Étape actuelle : <strong style="color:var(--gold2)">${esc(t.stepTitle||"—")}</strong>
        </div>
        <div style="font-size:.82rem;color:var(--muted);">
          stepId : <code style="color:var(--gold);font-size:.8rem;">${esc(t.stepId||"—")}</code><br/>
          Index : ${t.routeIndex} / ${t.routeTotal}
        </div>
      </div>`;
    }).join("") || `<div class="empty">Aucune donnée.</div>`;
  }

  // =====================
  // POLLING
  // =====================
  function startPolling(){ stopPolling(); polling = setInterval(()=>loadOverview(), 4000); }
  function stopPolling(){ if(polling){ clearInterval(polling); polling=null; } }

  // =====================
  // CONNECT
  // =====================
  async function connect(){
    const key = adminKeyIn.value.trim();
    if(!key){ setStatus("Entre la clé admin.", "err"); return; }
    adminKey = key;
    connectBtn.disabled = true;
    setStatus("Connexion…","info");
    const ok = await loadOverview();
    connectBtn.disabled = false;
    if(ok){
      tabsBar.style.display = "flex";
      startPolling();
      setStatus("✅ Connecté — actualisation toutes les 4s","ok");
      // Sauvegarder la clé pour recharge
      try{ sessionStorage.setItem("CARLO_ADMIN_KEY", key); }catch(e){}
    } else { adminKey = ""; }
  }

  connectBtn.addEventListener("click", connect);
  adminKeyIn.addEventListener("keydown", e => { if(e.key==="Enter") connect(); });
  refreshBtn.addEventListener("click", ()=>loadOverview());

  // =====================
  // MODAL FLAG
  // =====================
  customFlagBtn.addEventListener("click",()=>{
    mTeamId.value=""; mFlagKey.value=""; mFlagVal.value="true";
    modal.classList.remove("hidden"); mTeamId.focus();
  });
  mCancelBtn.addEventListener("click",()=>modal.classList.add("hidden"));
  modal.addEventListener("click",e=>{ if(e.target===modal) modal.classList.add("hidden"); });
  mConfirmBtn.addEventListener("click", async()=>{
    const tid = mTeamId.value.trim();
    const key = mFlagKey.value.trim();
    const raw = mFlagVal.value.trim();
    if(!tid||!key){ setStatus("teamId et clé requis.","err"); return; }
    const val = raw==="false" ? false : raw==="true" ? true : raw;
    mConfirmBtn.disabled = true;
    const ok = await setFlag(tid,key,val);
    mConfirmBtn.disabled = false;
    if(ok){ modal.classList.add("hidden"); setStatus(`✅ Flag "${key}" → ${val} sur ${tid}`,"ok"); await loadOverview(); }
  });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape") modal.classList.add("hidden"); });

  // =====================
  // Helpers
  // =====================
  function fmtDuration(ms){
    if(!ms) return "—";
    const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
    if(h) return `${h}h ${m}min ${sec}s`;
    if(m) return `${m}min ${sec}s`;
    return `${sec}s`;
  }
  function elapsed(startAt){
    if(!startAt) return "—";
    return fmtDuration(Date.now()-new Date(startAt).getTime());
  }
  function esc(s){
    return String(s||"")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // Auto-reconnect si clé en session
  try{
    const saved = sessionStorage.getItem("CARLO_ADMIN_KEY");
    if(saved){ adminKeyIn.value = saved; connect(); }
  }catch(e){}

  window.addEventListener("beforeunload",()=>stopPolling());
})();
</script>
</body>
</html>
